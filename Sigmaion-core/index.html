<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIGMAION CORE</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: "Courier New", monospace;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
h1 {
    text-align: center;
    margin-top: 60px;
    letter-spacing: 5px;
}

/* LAYOUT */
.wrapper {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin-top: 50px;
}

/* LEFT */
.books {
    width: 300px;
}

.card {
    margin-bottom: 20px;
    padding: 20px;
    border: 1px solid #00ff9f33;
    background: rgba(0,0,0,0.8);
}

.card h2 {
    margin-bottom: 10px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    text-decoration: none;
    font-size: 12px;
}

.btn:hover {
    background: #00ff9f;
    color: black;
}

/* RIGHT PANEL */
.system {
    width: 350px;
    border-left: 1px solid #00ff9f33;
    padding-left: 25px;
}

.system h3 {
    margin-bottom: 20px;
}

.system p {
    font-size: 13px;
    line-height: 1.6;
    color: #00ff9fcc;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 80px;
    font-size: 11px;
    color: #00ff9f55;
}
</style>

</head>

<body>

<canvas id="matrix"></canvas>

<h1>SIGMAION CORE</h1>

<div class="wrapper">

    <!-- LEFT CONTENT -->
    <div class="books">

        <div class="card">
            <h2>FALSEMIND</h2>
            <a class="btn" href="ebooks/Falsemind.pdf" download>DOWNLOAD</a>
        </div>

        <div class="card">
            <h2>ANIMUS</h2>
            <a class="btn" href="ebooks/Animus.pdf" download>DOWNLOAD</a>
        </div>

        <div class="card">
            <h2>ZERODOPAMINE</h2>
            <a class="btn" href="ebooks/Zerodopamine.pdf" download>DOWNLOAD</a>
        </div>

        <!-- NUOVO BOTTON LIBRARY -->
        <div class="card">
            <h2>LIBRARY</h2>
            <a class="btn" href="https://sigmaionkernels.github.io/Sigmaion-Core/">
                ENTER LIBRARY
            </a>
        </div>

    </div>

    <!-- RIGHT SYSTEM PANEL -->
    <div class="system">
        <h3>SYSTEM STATUS</h3>

        <p>CORE: ACTIVE</p>
        <p>CONTENT: STATIC MODE</p>
        <p>AUTO-CONTENT: DISCONNECTED</p>
        <p>DIRECTORS: NOT INITIALIZED</p>
    </div>

</div>

<div class="footer">
SIGMAION SYSTEM • CORE MODULE
</div>

<script>
/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01Σ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array.from({ length: columns }).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
