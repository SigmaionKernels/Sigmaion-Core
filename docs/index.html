<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIGMAION CORE</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ff66;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 44px;
      letter-spacing: 6px;
      margin: 0;
      text-shadow: 0 0 10px #00ff66;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.7;
    }

    .menu {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 260px;
    }

    a {
      color: #00ff66;
      text-decoration: none;
      border: 1px solid #00ff66;
      padding: 10px 14px;
      transition: 0.2s;
      display: block;
    }

    a:hover {
      background: #00ff66;
      color: #000;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      opacity: 0.5;
      letter-spacing: 2px;
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,102,0.04),
        rgba(0,255,102,0.04) 1px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="scanline"></div>

  <div class="wrap">
    <h1>SIGMAION</h1>
    <div class="subtitle">CORE SYSTEM ACTIVE</div>

    <div class="menu">
      <a href="content.html">AUTO CONTENT SYSTEM</a>
      <a href="cms.html">CMS EDITOR</a>
      <a href="content/">CONTENT DIRECTORY</a>
      <a href="system/status.json">SYSTEM STATUS</a>
      <a href="https://github.com/SigmaionKernels/Sigmaion-Core" target="_blank">REPOSITORY</a>
    </div>

    <div class="footer">
      STRUCTURE // PIPELINE // AUTOMATION
    </div>
  </div>
</body>
</html>
